<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإنجاز الذكية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #003366; /* أزرق ملكي */
            --accent-color: #D4AF37;  /* ذهبي */
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid var(--accent-color);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .input-section {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Tajawal';
            font-size: 16px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #002244;
            transform: translateY(-2px);
        }

        .data-display {
            margin-top: 40px;
            border-collapse: collapse;
            width: 100%;
        }

        .data-item {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            margin-bottom: 10px;
            border-right: 5px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            background: var(--accent-color);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>منصة توثيق الإنجازات الدائمة</h1>
    
    <div class="input-section">
        <input type="text" id="studentName" placeholder="اسم الطالبة / المبادرة">
        <select id="category">
            <option value="إنجاز">نوع المشاركة: إنجاز</option>
            <option value="موهبة">نوع المشاركة: موهبة</option>
            <option value="تكريم">نوع المشاركة: تكريم</option>
        </select>
        <textarea id="details" rows="4" placeholder="تفاصيل العمل أو الملاحظات..."></textarea>
        <button onclick="saveData()">حفظ البيانات بشكل دائم</button>
    </div>

    <div id="savedContent" class="data-list">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // إعدادات Firebase (يجب وضع إعدادات حسابك هنا لضمان الملكية الخاصة)
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "your-app.firebaseapp.com",
        databaseURL: "https://your-app.firebaseio.com",
        projectId: "your-app",
        storageBucket: "your-app.appspot.com",
        messagingSenderId: "12345",
        appId: "1:12345:web:6789"
    };

    // بدء التشغيل
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // وظيفة الحفظ
    function saveData() {
        const name = document.getElementById('studentName').value;
        const cat = document.getElementById('category').value;
        const desc = document.getElementById('details').value;

        if(name === "") { alert("يرجى إدخال الاسم"); return; }

        const newEntry = database.ref('entries').push();
        newEntry.set({
            name: name,
            category: cat,
            details: desc,
            timestamp: Date.now()
        }).then(() => {
            alert("تم الحفظ في قاعدة البيانات بنجاح!");
            document.getElementById('studentName').value = "";
            document.getElementById('details').value = "";
        });
    }

    // جلب البيانات وعرضها (تحديث تلقائي)
    database.ref('entries').on('value', (snapshot) => {
        const dataList = document.getElementById('savedContent');
        dataList.innerHTML = "<h3>السجلات المحفوظة:</h3>";
        
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            dataList.innerHTML += `
                <div class="data-item">
                    <div>
                        <strong>${data.name}</strong> <span class="status-badge">${data.category}</span>
                        <p style="margin: 5px 0 0 0; color: #666;">${data.details}</p>
                    </div>
                    <button style="background:red; padding: 5px 10px;" onclick="deleteItem('${childSnapshot.key}')">حذف</button>
                </div>
            `;
        });
    });

    function deleteItem(id) {
        if(confirm("هل أنتِ متأكدة من الحذف؟")) {
            database.ref('entries/' + id).remove();
        }
    }
</script>

</body>
</html>
