<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الإتقان الذكي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{font-family:Arial;background:#eef3ef;margin:0}
.header{background:#2f855a;color:#fff;padding:15px;text-align:center;font-size:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:20px;text-align:center;border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,.1);cursor:pointer;border-bottom:5px solid #ccc}
.section{display:none;padding:20px}
.active{display:block}
input{width:100%;padding:10px;margin-top:5px}
button{padding:10px;background:#2f855a;color:#fff;border:none;margin-top:5px}
</style>
</head>

<body>

<div class="header">🎓 منصة تحليل نتائج مادة التوحيد</div>

<div id="home" class="section active">

<div style="background:#f8f9fa;padding:15px;border-radius:12px;margin:15px">
<h3 style="color:#2f855a">📌 البيانات الأساسية</h3>

<input id="subjectName" placeholder="اسم المادة">
<input id="teacherName" placeholder="اسم المعلمة">
<input id="schoolName" placeholder="اسم المدرسة">

<label style="background:#2f855a;color:#fff;padding:10px;border-radius:10px;display:block;text-align:center;margin-top:10px;cursor:pointer">
📄 رفع المنهج PDF
<input type="file" hidden onchange="processPDF(this)">
</label>

<div id="skillsList"></div>
</div>

<div class="grid">
<div class="card">📄 رفع المنهج PDF</div>
<div class="card">👩‍🎓 الطالبات</div>
<div class="card">🏫 إدارة الفصول</div>
<div class="card">⚙️ البيانات الأساسية</div>
<div class="card">⚠️ الفاقد التعليمي</div>
<div class="card">📊 التحليل الإحصائي</div>
<div class="card">✍️ إدخال الدرجات</div>
<div class="card">🎯 المهارات</div>
<div class="card" onclick="go('archive')">📁 الأرشيف</div>
</div>

</div>

<div id="archive" class="section">
<h3>📁 الأرشيف</h3>
<button onclick="saveArchive()">حفظ نسخة</button>
<div id="archiveList"></div>
<button onclick="go('home')">رجوع</button>
</div>

<script>

["subjectName","teacherName","schoolName"].forEach(id=>{
let el=document.getElementById(id);
if(localStorage.getItem(id)) el.value=localStorage.getItem(id);
el.oninput=()=>localStorage.setItem(id,el.value);
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function processPDF(input){
let file=input.files[0];
let reader=new FileReader();

reader.onload=async function(){
let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
let skills=[];

for(let i=1;i<=pdf.numPages;i++){
let page=await pdf.getPage(i);
let txt=await page.getTextContent();
let text=txt.items.map(s=>s.str).join(" ");
let match=text.match(/(أن\s\w+[^.]{10,50}|يميز\s[^.]{10,50}|يعدد\s[^.]{10,50})/g);
if(match)skills.push(...match);
}

skills=[...new Set(skills)];
skillsList.innerHTML=skills.map(s=>"<div>"+s+"</div>").join("");
};

reader.readAsArrayBuffer(file);
}

function saveArchive(){
let a=JSON.parse(localStorage.getItem("archive")||"[]");
a.push(new Date().toLocaleString());
localStorage.setItem("archive",JSON.stringify(a));
renderArchive();
}

function renderArchive(){
let a=JSON.parse(localStorage.getItem("archive")||"[]");
archiveList.innerHTML=a.map(x=>"<div>"+x+"</div>").join("");
}

function go(x){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(x).classList.add('active');
if(x=="archive") renderArchive();
}

</script>

</body>
</html>
